<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="1" stop-color="#1A2A4A"/>
    </linearGradient>
    <linearGradient id="panel" x1="40" y1="80" x2="1240" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111A33"/>
      <stop offset="1" stop-color="#10172D"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1280" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="40" y="80" width="1200" height="480" rx="28" fill="url(#panel)" stroke="#2A3A6B" stroke-width="2"/>
  </g>

  <text x="90" y="140" fill="#9DD6FF" font-size="38" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">OpenClaw Skill</text>
  <text x="90" y="205" fill="white" font-size="58" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="800">Obsidian / Markdown → Cloudflare Pages</text>

  <!-- Node 1 -->
  <rect x="50" y="300" width="300" height="170" rx="24" fill="#0F1530" stroke="#5B8CFF" stroke-width="4"/>
  <circle cx="108" cy="358" r="30" fill="#5B8CFF"/>
  <text x="108" y="370" text-anchor="middle" fill="white" font-size="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="800">O</text>
  <text x="190" y="365" text-anchor="middle" fill="white" font-size="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">OpenClaw</text>

  <!-- Arrow 1 -->
  <line x1="360" y1="385" x2="450" y2="385" stroke="#8FB5FF" stroke-width="8"/>
  <polygon points="450,385 432,374 432,396" fill="#8FB5FF"/>

  <!-- Node 2 -->
  <rect x="470" y="300" width="300" height="170" rx="24" fill="#0F1530" stroke="#7C6CFF" stroke-width="4"/>
  <circle cx="528" cy="358" r="30" fill="#7C6CFF"/>
  <text x="528" y="370" text-anchor="middle" fill="white" font-size="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="800">O</text>
  <text x="610" y="365" text-anchor="middle" fill="white" font-size="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Obsidian</text>

  <!-- Arrow 2 -->
  <line x1="780" y1="385" x2="870" y2="385" stroke="#8FB5FF" stroke-width="8"/>
  <polygon points="870,385 852,374 852,396" fill="#8FB5FF"/>

  <!-- Node 3 -->
  <rect x="890" y="300" width="300" height="170" rx="24" fill="#0F1530" stroke="#FF8A3D" stroke-width="4"/>
  <circle cx="948" cy="358" r="30" fill="#FF8A3D"/>
  <text x="948" y="370" text-anchor="middle" fill="white" font-size="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="800">C</text>
  <text x="1030" y="365" text-anchor="middle" fill="white" font-size="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Cloudflare</text>

  <text x="90" y="530" fill="#B9C7EA" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="500">Publish web clippings and Markdown folders as a static site (optional basic auth)</text>
</svg>
